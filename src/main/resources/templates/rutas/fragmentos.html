<section th:fragment="agregar">

    <div class='row py-4 mb-2 bg-light'>
        <div class='col-md-1'></div>
        <div class='col-md-3'>
            <button type="button" class="btn btn-primary"
                    sec:authorize="hasRole('ROLE_ADMIN')"
                    data-bs-toggle="modal" data-bs-target="#agregarRutaModal">
                <i class="fa-solid fa-plus"></i> Agregar Ruta
            </button>
        </div>
    </div>

    <div class="modal fade" id="agregarRutaModal" tabindex="-1">
        <div class="modal-dialog modal-md">
            <div class="modal-content">

                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title">
                        <i class="fa-solid fa-route"></i> Nueva Ruta
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action='@{/rutas/guardar}' th:object='${ruta}' method="post" class="was-validated">
                    <div class="modal-body">

                        <div class="mb-3">
                            <label>Ruta</label>
                            <input type="text" class="form-control" th:field="*{rutas}" required>
                        </div>

                        <div class="mb-3">
                            <label>Requiere Rol</label>
                            <input type="checkbox" th:field="*{requiereRol}">
                        </div>

                        <div class="mb-3">
                            <label>Rol</label>
                            <select class="form-select" th:field="*{rol}">
                                <option th:each="r : ${roles}" 
                                        th:value="${r.idRol}" 
                                        th:text="${r.rol}">
                                </option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</section>

<!----- Listado de rutas ----->
<section th:fragment="listado" class="p-3">

    <div class="card">
        <div class="card-header">
            <h4>Listado de Rutas</h4>
        </div>

        <div class="card-body">

            <div th:if="${rutas != null and !rutas.empty}">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Ruta</th>
                            <th>Requiere Rol</th>
                            <th>Rol</th>
                            <th sec:authorize="hasRole('ROLE_ADMIN')"></th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="r : ${rutas}">
                            <td>[[${r.idRuta}]]</td>
                            <td>[[${r.ruta}]]</td>
                            <td>[[${r.requiereRol}]]</td>
                            <td>[[${r.rol != null ? r.rol.rol : '-'}]]</td>

                            <td sec:authorize="hasRole('ROLE_ADMIN')">
                                <div class="d-flex gap-2">

                                    <button class="btn btn-danger"
                                            data-bs-toggle="modal"
                                            data-bs-target="#confirmModal"
                                            th:data-bs-id="${r.idRuta}"
                                            th:data-bs-descripcion="${r.ruta}">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>

                                    <a th:href="@{/rutas/modificar/{id}(id=${r.idRuta})}"
                                       class="btn btn-warning">
                                        <i class="fa-solid fa-pencil"></i>
                                    </a>

                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${rutas == null or rutas.empty}" class="text-center">
                Lista vacía
            </div>

        </div>
    </div>

</section>

<!----- Editar Rutas ----->
<section th:fragment="editar">

    <div class="row">
        <div class="col-md-8 offset-md-2">

            <form method="POST" th:action="@{/rutas/guardar}" th:object="${ruta}" class="was-validated">

                <input type="hidden" th:field="*{idRuta}"/>

                <div class="mb-3">
                    <label>Ruta</label>
                    <input type="text" class="form-control" th:field="*{ruta}" required>
                </div>

                <div class="mb-3">
                    <label>Requiere Rol</label>
                    <input type="checkbox" th:field="*{requiereRol}">
                </div>

                <div class="mb-3">
                    <label>Rol</label>
                    <select class="form-select" th:field="*{rol}">
                        <option th:each="r : ${roles}" 
                                th:value="${r.idRol}" 
                                th:text="${r.rol}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/rutas/listado}" class="btn btn-secondary">Cancelar</a>

            </form>

        </div>
    </div>

</section>

<!----- Eliminar ----->
<section th:fragment="confirmarEliminar">

    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <form th:action="@{/rutas/eliminar}" method="post">

                    <input type="hidden" name="idRuta" id="modalId"/>

                    <div class="modal-header bg-warning">
                        <h5>Confirmar</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        ¿Eliminar ruta <span id="modalDescripcion"></span>?
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    </div>

                </form>

            </div>
        </div>
    </div>

</section>
